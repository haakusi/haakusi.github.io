<!DOCTYPE html>
<html data-theme="dark" data-lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reading - Sewon Park</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode"></button>
    <button class="lang-toggle" onclick="toggleLanguage()" aria-label="Toggle language">EN</button>

    <div class="container">
        <div id="site-header"></div>
        <div id="site-nav"></div>

        <section class="reading-intro">
            <h2 data-en="Reading Log" data-kr="독서 기록">Reading Log</h2>
            <p data-en="Books I've read and key takeaways. Personal reflections and points that resonated with me."
               data-kr="읽은 책과 핵심 포인트. 개인적인 생각과 인상 깊었던 점을 기록합니다.">Books I've read and key takeaways. Personal reflections and points that resonated with me.</p>
        </section>

        <section class="reading-stats">
            <div class="stats-bar">
                <span class="stat-item" data-en="2026: 0 books" data-kr="2026: 0권">2026: 0 books</span>
            </div>
        </section>

        <section class="reading-filter">
            <button class="filter-btn active" onclick="filterBooks('all')" data-en="All" data-kr="전체">All</button>
            <button class="filter-btn" onclick="filterBooks('cs')" data-en="CS" data-kr="CS">CS</button>
            <button class="filter-btn" onclick="filterBooks('math')" data-en="Math" data-kr="수학">Math</button>
            <button class="filter-btn" onclick="filterBooks('philosophy')" data-en="Philosophy" data-kr="철학">Philosophy</button>
            <button class="filter-btn" onclick="filterBooks('science')" data-en="Science" data-kr="과학">Science</button>
            <button class="filter-btn" onclick="filterBooks('other')" data-en="Other" data-kr="기타">Other</button>
        </section>

        <section class="book-list" id="book-list">
            <p class="empty-state" data-en="Reading log starts here. First entries coming soon." data-kr="독서 기록이 여기서 시작됩니다. 곧 첫 기록이 올라옵니다.">Reading log starts here. First entries coming soon.</p>
        </section>

        <div id="site-footer"></div>
    </div>

    <script>
        function filterBooks(category) {
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            const cards = document.querySelectorAll('.book-card');
            cards.forEach(card => {
                if (category === 'all' || card.dataset.category === category) {
                    card.style.display = '';
                } else {
                    card.style.display = 'none';
                }
            });
        }
    </script>
    <script src="common.js"></script>
</body>
</html>
