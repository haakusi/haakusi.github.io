    <script>
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            document.querySelector('.theme-toggle').textContent = newTheme === 'dark' ? '\u2600\uFE0F' : '\uD83C\uDF19';
        }

        function toggleLanguage() {
            const html = document.documentElement;
            const currentLang = html.getAttribute('data-lang') || 'en';
            const newLang = currentLang === 'en' ? 'kr' : 'en';
            html.setAttribute('data-lang', newLang);
            localStorage.setItem('language', newLang);
            document.querySelector('.lang-toggle').textContent = newLang === 'en' ? 'EN' : '\uD55C';
            updateContent(newLang);
        }

        function updateContent(lang) {
            document.querySelectorAll('[data-en][data-kr]').forEach(el => {
                if (lang === 'kr' && el.getAttribute('data-kr')) el.textContent = el.getAttribute('data-kr');
                else if (lang === 'en' && el.getAttribute('data-en')) el.textContent = el.getAttribute('data-en');
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            document.querySelector('.theme-toggle').textContent = savedTheme === 'dark' ? '\u2600\uFE0F' : '\uD83C\uDF19';
            const savedLang = localStorage.getItem('language') || 'en';
            document.documentElement.setAttribute('data-lang', savedLang);
            document.querySelector('.lang-toggle').textContent = savedLang === 'en' ? 'EN' : '\uD55C';
            updateContent(savedLang);
        });
    </script>
